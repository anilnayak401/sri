<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 500 500">
  <rect width="500" height="500" fill="#F4EEF2"/>

  <!--
    Srikara logo — 5 human figures in a clockwise pinwheel.

    Each figure is a SINGLE rotated copy of the same shape:
      • One long sweeping arm going far left (sharp tip)
      • One shorter arm going upper-right (sharp tip)
      • Body connecting both arms through the center
      • Round head at the top

    The key insight: each figure is tilted ~36° clockwise from the previous,
    and the body shape itself is asymmetric — left arm is longer/lower,
    right arm is shorter/higher — creating the spinning pinwheel.

    All paths drawn relative to center (250,250).
  -->

  <g transform="translate(250,250)">

    <!--
      Single figure shape (upright, 0°):
        - Head at top-center
        - Right arm sweeps up-right to sharp point
        - Left arm sweeps far left to sharp point
        - Body is the filled region between arms converging at origin
    -->

    <!-- Figure 1 — 0° -->
    <g transform="rotate(0)">
      <!-- Main body: left arm long sweep + right arm shorter sweep, meeting at origin -->
      <path d="
        M 0,0
        C 5,-15  25,-35  15,-75
        C 5,-80  -5,-78  -8,-68
        C -12,-55 -5,-35  0,-20
        C -5,-35  -30,-50  -55,-45
        C -70,-42  -80,-30  -72,-18
        C -62,-5   -35,0    0,0 Z
      " fill="#8B1A4A"/>
      <!-- Head -->
      <circle cx="-2" cy="-88" r="18" fill="#2D3A4A"/>
    </g>

    <!-- Figure 2 — 72° -->
    <g transform="rotate(72)">
      <path d="
        M 0,0
        C 5,-15  25,-35  15,-75
        C 5,-80  -5,-78  -8,-68
        C -12,-55 -5,-35  0,-20
        C -5,-35  -30,-50  -55,-45
        C -70,-42  -80,-30  -72,-18
        C -62,-5   -35,0    0,0 Z
      " fill="#8B1A4A"/>
      <circle cx="-2" cy="-88" r="18" fill="#2D3A4A"/>
    </g>

    <!-- Figure 3 — 144° -->
    <g transform="rotate(144)">
      <path d="
        M 0,0
        C 5,-15  25,-35  15,-75
        C 5,-80  -5,-78  -8,-68
        C -12,-55 -5,-35  0,-20
        C -5,-35  -30,-50  -55,-45
        C -70,-42  -80,-30  -72,-18
        C -62,-5   -35,0    0,0 Z
      " fill="#8B1A4A"/>
      <circle cx="-2" cy="-88" r="18" fill="#2D3A4A"/>
    </g>

    <!-- Figure 4 — 216° -->
    <g transform="rotate(216)">
      <path d="
        M 0,0
        C 5,-15  25,-35  15,-75
        C 5,-80  -5,-78  -8,-68
        C -12,-55 -5,-35  0,-20
        C -5,-35  -30,-50  -55,-45
        C -70,-42  -80,-30  -72,-18
        C -62,-5   -35,0    0,0 Z
      " fill="#8B1A4A"/>
      <circle cx="-2" cy="-88" r="18" fill="#2D3A4A"/>
    </g>

    <!-- Figure 5 — 288° -->
    <g transform="rotate(288)">
      <path d="
        M 0,0
        C 5,-15  25,-35  15,-75
        C 5,-80  -5,-78  -8,-68
        C -12,-55 -5,-35  0,-20
        C -5,-35  -30,-50  -55,-45
        C -70,-42  -80,-30  -72,-18
        C -62,-5   -35,0    0,0 Z
      " fill="#8B1A4A"/>
      <circle cx="-2" cy="-88" r="18" fill="#2D3A4A"/>
    </g>

    <!-- White starburst center — 10-point star -->
    <polygon
      points="
        0,-38   7,-22   24,-24   14,-10   24,4
        8,4     10,22   0,14    -10,22  -8,4
        -24,4  -14,-10  -24,-24  -7,-22
      "
      fill="white"
    />

  </g>
</svg>
